<style>
/* === CSS 变量与主题 === */
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f8f9fa;
  --bg-tertiary: #e9ecef;
  --text-primary: #212529;
  --text-secondary: #6c757d;
  --border-color: #dee2e6;
  --accent: #0d6efd;
  --accent-hover: #0b5ed7;
  --danger: #dc3545;
  --danger-hover: #bb2d3b;
  --success: #198754;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-tertiary: #0f3460;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0a0;
    --border-color: #2a2a4a;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
    --accent: #4d94ff;
    --accent-hover: #6ba6ff;
    --danger: #ff6b6b;
    --danger-hover: #ff8787;
    --success: #51cf66;
  }
}
/* === 全局重置 === */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg-secondary);
  color: var(--text-primary);
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* === 布局 === */
.app { display: flex; flex-direction: column; min-height: 100vh; }
.header {
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border-color);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 1.25rem; font-weight: 600; }
.header-actions { display: flex; align-items: center; gap: 12px; }
.main { flex: 1; padding: 24px; max-width: 1400px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; min-height: 0; }
#panel-list { display: flex; flex-direction: column; min-height: 0; }
#panel-editor { flex: 1; min-height: 0; }

/* === 按钮 === */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border: none; border-radius: var(--radius);
  font-size: 0.875rem; font-weight: 500; cursor: pointer;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: var(--danger-hover); }
.btn-outline {
  background: transparent; border: 1px solid var(--border-color);
  color: var(--text-primary);
}
.btn-outline:hover { background: var(--bg-tertiary); }
.btn-sm { padding: 4px 10px; font-size: 0.8rem; }
.btn-lg { padding: 12px 24px; font-size: 1rem; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.btn .spinner {
  width: 13px; height: 13px; border: 2px solid currentColor;
  border-top-color: transparent; border-radius: 50%;
  display: inline-block; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === 状态徽章 === */
.badge {
  font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
  font-weight: 600; margin-left: 8px;
}
.badge-draft { background: var(--bg-tertiary); color: var(--text-secondary); }
.badge-published { background: var(--success); color: #fff; }
.required-mark { color: var(--danger); margin-left: 2px; }

/* === 加载动画 === */
.loading-spinner {
  width: 32px; height: 32px; border: 3px solid var(--border-color);
  border-top-color: var(--accent); border-radius: 50%;
  margin: 0 auto 12px; animation: spin 0.7s linear infinite;
}
.empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
.empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; }

/* === 登录视图 === */
.login-view {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
.login-card {
  background: var(--bg-primary); padding: 48px;
  border-radius: 12px; box-shadow: var(--shadow);
  text-align: center; max-width: 400px; width: 90%;
}
.login-card h2 { margin-bottom: 12px; font-size: 1.5rem; }
.login-card p { color: var(--text-secondary); margin-bottom: 24px; }

/* === 用户信息 === */
.user-info { font-size: 0.875rem; color: var(--text-secondary); }

/* === 文章列表 === */
.list-toolbar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.search-input {
  flex: 1; min-width: 200px; padding: 8px 14px;
  border: 1px solid var(--border-color); border-radius: var(--radius);
  background: var(--bg-primary); color: var(--text-primary);
  font-size: 0.875rem;
}
.search-input:focus { outline: none; border-color: var(--accent); }
.posts-container { display: flex; flex-direction: column; gap: 8px; }
.post-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; background: var(--bg-primary);
  border-radius: var(--radius); border: 1px solid var(--border-color);
  transition: box-shadow 0.2s;
}
.post-item:hover { box-shadow: var(--shadow); }
.post-info { flex: 1; min-width: 0; }
.post-title {
  font-weight: 500; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.post-date { font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px; }
.post-actions { display: flex; gap: 8px; flex-shrink: 0; margin-left: 12px; }

/* === 编辑器 === */
.editor-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.editor-header-actions { display: flex; gap: 8px; }
.editor-meta {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px; margin-bottom: 12px;
  background: var(--bg-primary); padding: 16px;
  border-radius: var(--radius); border: 1px solid var(--border-color);
}
.meta-row { display: flex; flex-direction: column; gap: 4px; }
.meta-row label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); }
.meta-row input {
  padding: 6px 10px; border: 1px solid var(--border-color);
  border-radius: 4px; background: var(--bg-secondary);
  color: var(--text-primary); font-size: 0.875rem;
}
.meta-row input:focus { outline: none; border-color: var(--accent); }
.editor-toolbar {
  display: flex; align-items: center; gap: 4px;
  padding: 8px 12px; background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius) var(--radius) 0 0;
  flex-wrap: wrap;
}
.toolbar-sep { width: 1px; height: 20px; background: var(--border-color); margin: 0 8px; }
.editor-body {
  display: grid; grid-template-columns: 1fr 1fr;
  border: 1px solid var(--border-color); border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden; flex: 1; min-height: 400px;
}
.editor-pane { position: relative; display: flex; flex-direction: column; }
.editor-pane textarea {
  flex: 1; padding: 16px; border: none; resize: none;
  font-family: "JetBrains Mono", "Fira Code", monospace;
  font-size: 0.9rem; line-height: 1.6;
  background: var(--bg-primary); color: var(--text-primary);
}
.editor-pane textarea:focus { outline: none; }
.drop-zone {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px; text-align: center; font-size: 0.8rem;
  color: var(--text-secondary); background: var(--bg-tertiary);
  border-top: 1px dashed var(--border-color);
  transition: all 0.2s;
}
.drop-zone.dragover {
  background: var(--accent); color: #fff;
  padding: 20px; font-size: 1rem;
}
.preview-pane {
  padding: 16px; overflow-y: auto;
  border-left: 1px solid var(--border-color);
  background: var(--bg-primary);
}

/* === 预览区 Markdown 样式 === */
.preview-pane h1, .preview-pane h2, .preview-pane h3 {
  margin: 16px 0 8px; border-bottom: 1px solid var(--border-color);
  padding-bottom: 4px;
}
.preview-pane p { margin: 8px 0; line-height: 1.7; }
.preview-pane code {
  background: var(--bg-tertiary); padding: 2px 6px;
  border-radius: 3px; font-size: 0.85em;
}
.preview-pane pre {
  background: var(--bg-secondary); padding: 12px;
  border-radius: var(--radius); overflow-x: auto;
  margin: 12px 0;
}
.preview-pane pre code { background: none; padding: 0; }
.preview-pane img { max-width: 100%; border-radius: var(--radius); }
.preview-pane blockquote {
  border-left: 4px solid var(--accent); padding-left: 12px;
  color: var(--text-secondary); margin: 12px 0;
}

/* === Toast 通知 === */
.toast-container {
  position: fixed; top: 20px; right: 20px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 12px 20px; border-radius: var(--radius);
  color: #fff; font-size: 0.875rem; box-shadow: var(--shadow);
  animation: slideIn 0.3s ease;
}
.toast-success { background: var(--success); }
.toast-error { background: var(--danger); }
.toast-info { background: var(--accent); }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* === Loading === */
.loading {
  text-align: center; padding: 40px;
  color: var(--text-secondary); font-size: 0.9rem;
}

/* === 响应式 === */
@media (max-width: 1200px) {
  .editor-meta { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .main { padding: 12px; }
  .editor-body { grid-template-columns: 1fr; flex: none; height: auto; }
  .editor-pane textarea { min-height: 320px; }
  .preview-pane { border-left: none; border-top: 1px solid var(--border-color); min-height: 300px; }
  .editor-meta { grid-template-columns: 1fr; }
  .editor-toolbar { gap: 6px; }
  .editor-toolbar .btn-sm { padding: 6px 12px; }
  .post-item { flex-direction: column; align-items: flex-start; gap: 8px; }
  .post-actions { margin-left: 0; }
  .header { padding: 10px 14px; }
  .header h1 { font-size: 1rem; }
}
</style>

<script>
// ============================================================
// 配置常量
// ============================================================
const CLIENT_ID = 'Ov23liX57P7SJn7x6BEI';
const WORKER_URL = 'https://blog-oauth-proxy.meow-249.workers.dev';
const REPO_OWNER = 'AriesOxO';
const REPO_NAME = 'AriesOxO.github.io';
const API_BASE = 'https://api.github.com';

// ============================================================
// 状态管理
// ============================================================
let currentPosts = [];
let editingFile = null; // { path, sha, name }
let preservedFm = {};   // 编辑时保留的未知 front matter 字段（原样回写）
let isDirty = false;    // 是否有未保存改动
let autoSaveTimer = null;

// ============================================================
// 工具函数
// ============================================================
function getToken() {
  return sessionStorage.getItem('github_token');
}

function setToken(token) {
  sessionStorage.setItem('github_token', token);
}

function clearToken() {
  sessionStorage.removeItem('github_token');
}

function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

async function apiRequest(endpoint, options = {}) {
  const token = getToken();
  const headers = {
    'Authorization': `token ${token}`,
    'Accept': 'application/vnd.github.v3+json',
    ...options.headers
  };
  let res;
  try {
    res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
  } catch (e) {
    throw new Error('网络请求失败，请检查网络连接');
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const e = new Error(mapApiError(res.status, err.message));
    e.status = res.status;
    // token 过期/无效：自动登出
    if (res.status === 401) {
      clearToken();
      setTimeout(() => showView('login'), 1500);
    }
    throw e;
  }
  return res.status === 204 ? null : res.json();
}

function mapApiError(status, msg) {
  switch (status) {
    case 401: return '登录已过期，请重新登录';
    case 403:
      if (msg && msg.includes('rate limit')) return 'API 请求频率超限，请稍后再试';
      return '权限不足，无法执行此操作';
    case 404: return '资源不存在（文件可能已被删除）';
    case 409: return '文件已被外部修改（sha 冲突）';
    case 422: return '文件已存在或内容校验失败';
    case 429: return '请求过于频繁，请稍后再试';
    default: return msg || `请求失败 (${status})`;
  }
}
</script>
<script>
// ============================================================
// 认证模块
// ============================================================
function doLogin() {
  const redirectUri = `${location.origin}/admin/`;
  const url = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=repo`;
  location.href = url;
}

function doLogout() {
  clearToken();
  showView('login');
}

async function exchangeCode(code) {
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await res.json();
    if (data.access_token) {
      setToken(data.access_token);
      // 清除 URL 中的 code 参数
      history.replaceState(null, '', location.pathname);
      return true;
    } else {
      throw new Error(data.error || '获取 token 失败');
    }
  } catch (e) {
    showToast(`认证失败: ${e.message}`, 'error');
    return false;
  }
}

async function verifyUser() {
  try {
    const user = await apiRequest('/user');
    if (user.login !== REPO_OWNER) {
      showToast('权限不足：仅博客所有者可登录', 'error');
      clearToken();
      return false;
    }
    document.getElementById('user-info').textContent = `👤 ${user.login}`;
    return true;
  } catch (e) {
    showToast(`验证用户失败: ${e.message}`, 'error');
    clearToken();
    return false;
  }
}

function showView(view) {
  document.getElementById('view-login').style.display = view === 'login' ? 'flex' : 'none';
  document.getElementById('view-app').style.display = view === 'app' ? 'flex' : 'none';
}
</script>

<script>
// ============================================================
// 文章列表模块
// ============================================================
async function loadDir(dir, status) {
  try {
    const files = await apiRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${dir}`);
    return files
      .filter(f => f.name.endsWith('.md'))
      .map(f => {
        const match = f.name.match(/^(\d{4}-\d{2}-\d{2})-(.+)\.md$/);
        return {
          name: f.name, path: f.path, sha: f.sha,
          date: match ? match[1] : '',
          title: match ? match[2].replace(/-/g, ' ') : f.name,
          status
        };
      });
  } catch (e) {
    if (e.status === 404) return []; // 目录不存在视为空
    throw e;
  }
}

async function loadPosts() {
  const container = document.getElementById('posts-container');
  container.innerHTML = '<div class="loading"><div class="loading-spinner"></div>加载文章列表中...</div>';
  try {
    const [posts, drafts] = await Promise.all([
      loadDir('_posts', 'published'),
      loadDir('_drafts', 'draft')
    ]);
    currentPosts = [...posts, ...drafts].sort((a, b) => b.date.localeCompare(a.date));
    filterPosts();
  } catch (e) {
    container.innerHTML = `<div class="empty-state" style="color:var(--danger)">
      <div class="empty-state-icon">⚠️</div>加载失败: ${escapeHtml(e.message)}
      <div style="margin-top:12px"><button class="btn btn-outline btn-sm" onclick="loadPosts()">重试</button></div>
    </div>`;
  }
}

function renderPosts(posts) {
  const container = document.getElementById('posts-container');
  if (posts.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div>暂无文章，点击「新建文章」开始写作</div>';
    return;
  }
  container.innerHTML = posts.map(p => {
    const badge = p.status === 'draft'
      ? '<span class="badge badge-draft">草稿</span>'
      : '<span class="badge badge-published">已发布</span>';
    return `
    <div class="post-item">
      <div class="post-info">
        <div class="post-title">${escapeHtml(p.title)}${badge}</div>
        <div class="post-date">${p.date}</div>
      </div>
      <div class="post-actions">
        <button class="btn btn-outline btn-sm" onclick="editPost('${escapeAttr(p.path)}', '${p.sha}', '${escapeAttr(p.name)}', '${p.status}')">编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deletePost('${escapeAttr(p.path)}', '${p.sha}', '${escapeAttr(p.name)}')">删除</button>
      </div>
    </div>`;
  }).join('');
}

function filterPosts() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const status = document.getElementById('filter-status').value;
  const filtered = currentPosts.filter(p => {
    const matchQuery = p.title.toLowerCase().includes(query) || p.date.includes(query);
    const matchStatus = status === 'all' || p.status === status;
    return matchQuery && matchStatus;
  });
  renderPosts(filtered);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escapeAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
</script>

<script>
// ============================================================
// 编辑器模块
// ============================================================
function showList() {
  if (isDirty && !confirm('有未保存的修改，确定要离开吗？')) return;
  document.getElementById('panel-list').style.display = 'flex';
  document.getElementById('panel-editor').style.display = 'none';
  editingFile = null;
  isDirty = false;
  clearLocalDraft();
  loadPosts();
}

function showEditor(file) {
  document.getElementById('panel-list').style.display = 'none';
  document.getElementById('panel-editor').style.display = 'flex';
  // 清空表单
  document.getElementById('meta-title').value = '';
  document.getElementById('meta-category').value = '';
  document.getElementById('meta-tags').value = '';
  document.getElementById('meta-series').value = '';
  document.getElementById('meta-draft').checked = false;
  document.getElementById('editor-textarea').value = '';
  document.getElementById('preview-pane').innerHTML = '';
  editingFile = file;
  preservedFm = {};
  isDirty = false;
}

async function editPost(path, sha, name, status) {
  showEditor({ path, sha, name, status });
  showToast('加载文章内容...', 'info');
  try {
    const data = await apiRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`);
    const content = decodeBase64(data.content);
    editingFile.sha = data.sha;
    // 解析 front matter
    const fmMatch = content.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
    if (fmMatch) {
      parseFrontMatter(fmMatch[1]);
      document.getElementById('editor-textarea').value = fmMatch[2];
    } else {
      document.getElementById('editor-textarea').value = content;
    }
    // 草稿目录的文章默认勾选草稿
    if (status === 'draft') document.getElementById('meta-draft').checked = true;
    updatePreview();
    isDirty = false;
    showToast('文章已加载', 'success');
  } catch (e) {
    showToast(`加载失败: ${e.message}`, 'error');
  }
}

// 已被表单接管的字段，其余字段原样保留
const MANAGED_KEYS = ['title', 'category', 'tags', 'series', 'published'];

function parseFrontMatter(fm) {
  preservedFm = {};
  const lines = fm.split('\n');
  let i = 0;
  const fields = {};
  while (i < lines.length) {
    const line = lines[i];
    const m = line.match(/^([\w-]+):\s*(.*)$/);
    if (!m) { i++; continue; }
    const key = m[1];
    let rawVal = m[2];
    // YAML 块标量 (| 或 >) 或多行数组：收集后续缩进行
    if (rawVal === '|' || rawVal === '>' || rawVal === '') {
      const block = [];
      let j = i + 1;
      while (j < lines.length && (lines[j].match(/^\s+/) || lines[j].trim() === '')) {
        block.push(lines[j]); j++;
      }
      if (block.length) {
        fields[key] = rawVal + '\n' + block.join('\n');
        i = j; continue;
      }
    }
    fields[key] = rawVal;
    i++;
  }
  // 填入表单 / 保留未知
  for (const [key, val] of Object.entries(fields)) {
    const clean = String(val).replace(/^["']|["']$/g, '');
    if (key === 'title') document.getElementById('meta-title').value = clean;
    else if (key === 'category') document.getElementById('meta-category').value = clean;
    else if (key === 'tags') {
      // 支持 [a, b] 行内格式；YAML 列表格式取每行 - 项
      let tags;
      if (val.includes('\n')) {
        tags = val.split('\n').map(l => l.replace(/^\s*-\s*/, '').trim()).filter(Boolean);
      } else {
        tags = val.replace(/^\[|\]$/g, '').split(',').map(t => t.trim().replace(/^["']|["']$/g, '')).filter(Boolean);
      }
      document.getElementById('meta-tags').value = tags.join(', ');
    }
    else if (key === 'series') document.getElementById('meta-series').value = clean;
    else if (key === 'published') document.getElementById('meta-draft').checked = (clean === 'false');
    else preservedFm[key] = val; // 未知字段原样保留
  }
}

function buildFrontMatter() {
  const title = document.getElementById('meta-title').value.trim();
  const category = document.getElementById('meta-category').value.trim();
  const tags = document.getElementById('meta-tags').value.trim();
  const series = document.getElementById('meta-series').value.trim();
  const isDraft = document.getElementById('meta-draft').checked;

  let fm = '---\n';
  fm += `title: "${title.replace(/"/g, '\\"')}"\n`;
  if (category) fm += `category: ${category}\n`;
  if (tags) {
    const arr = tags.split(',').map(t => t.trim()).filter(Boolean);
    fm += `tags: [${arr.join(', ')}]\n`;
  }
  if (series) fm += `series: "${series.replace(/"/g, '\\"')}"\n`;
  if (isDraft) fm += `published: false\n`;
  // 回写保留的未知字段
  for (const [key, val] of Object.entries(preservedFm)) {
    if (String(val).includes('\n')) {
      fm += `${key}: ${val}\n`;
    } else {
      fm += `${key}: ${val}\n`;
    }
  }
  fm += '---\n';
  return fm;
}

// ============================================================
// 保存文章
// ============================================================
async function savePost() {
  const btn = document.getElementById('btn-save');
  if (btn.disabled) return; // 防重复提交
  const title = document.getElementById('meta-title').value.trim();
  if (!title) {
    showToast('请输入文章标题', 'error');
    return;
  }
  const isDraft = document.getElementById('meta-draft').checked;
  const targetDir = isDraft ? '_drafts' : '_posts';
  const content = document.getElementById('editor-textarea').value;
  const fullContent = buildFrontMatter() + '\n' + content;
  const encoded = encodeBase64(fullContent);

  // 确定文件名
  let filename;
  if (editingFile && editingFile.name) {
    filename = editingFile.name;
  } else {
    const date = new Date().toISOString().slice(0, 10);
    filename = `${date}-${generateSlug(title)}.md`;
  }
  const path = `${targetDir}/${filename}`;
  const oldPath = editingFile && editingFile.path;
  const isMoving = oldPath && oldPath !== path; // 草稿↔发布切换需移动

  setBtnLoading(btn, true, '保存中...');
  try {
    const body = { message: `docs: ${editingFile && editingFile.path ? '更新' : '新建'}${isDraft ? '草稿' : '文章'} ${filename}`, content: encoded };
    // 移动时不带 sha（新文件），否则带 sha（更新）
    if (!isMoving && editingFile && editingFile.sha) body.sha = editingFile.sha;
    const res = await apiRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    // 移动成功后删除旧目录的文件
    if (isMoving) {
      await apiRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${oldPath}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: `docs: 移动文章 ${filename}`, sha: editingFile.sha })
      });
    }
    editingFile = { path, sha: res.content.sha, name: filename, status: isDraft ? 'draft' : 'published' };
    isDirty = false;
    clearLocalDraft();
    showToast(isDraft ? '已保存为草稿' : '保存成功！', 'success');
  } catch (e) {
    if (e.status === 409) {
      showToast('文件已被外部修改，请返回列表重新打开后再保存', 'error');
    } else {
      showToast(`保存失败: ${e.message}`, 'error');
    }
  } finally {
    setBtnLoading(btn, false, '保存文章');
  }
}

function setBtnLoading(btn, loading, text) {
  btn.disabled = loading;
  btn.innerHTML = loading ? `<span class="spinner"></span> ${text}` : text;
}

// ============================================================
// localStorage 自动保存
// ============================================================
const LOCAL_DRAFT_KEY = 'admin_local_draft';

function collectDraft() {
  return {
    title: document.getElementById('meta-title').value,
    category: document.getElementById('meta-category').value,
    tags: document.getElementById('meta-tags').value,
    series: document.getElementById('meta-series').value,
    draft: document.getElementById('meta-draft').checked,
    content: document.getElementById('editor-textarea').value,
    path: editingFile ? editingFile.path : null,
    savedAt: Date.now()
  };
}

function scheduleAutoSave() {
  isDirty = true;
  if (autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    const d = collectDraft();
    if (d.title || d.content) {
      localStorage.setItem(LOCAL_DRAFT_KEY, JSON.stringify(d));
    }
  }, 1000);
}

function clearLocalDraft() {
  localStorage.removeItem(LOCAL_DRAFT_KEY);
}

function restoreLocalDraft() {
  const raw = localStorage.getItem(LOCAL_DRAFT_KEY);
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    const when = new Date(d.savedAt).toLocaleString('zh-CN');
    if (confirm(`检测到未保存的草稿（${when}）\n标题：${d.title || '(无标题)'}\n\n是否恢复？`)) {
      showEditor(d.path ? { path: d.path, name: d.path.split('/').pop() } : null);
      document.getElementById('meta-title').value = d.title || '';
      document.getElementById('meta-category').value = d.category || '';
      document.getElementById('meta-tags').value = d.tags || '';
      document.getElementById('meta-series').value = d.series || '';
      document.getElementById('meta-draft').checked = !!d.draft;
      document.getElementById('editor-textarea').value = d.content || '';
      updatePreview();
    } else {
      clearLocalDraft();
    }
  } catch (e) { clearLocalDraft(); }
}

function generateSlug(title) {
  // 使用时间戳作为 slug（避免中文 URL 编码问题）
  const ts = Date.now().toString(36);
  // 尝试提取英文单词
  const english = title.replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '-').toLowerCase();
  return english || ts;
}

// ============================================================
// 删除文章
// ============================================================
let deleting = false;
async function deletePost(path, sha, name) {
  if (deleting) return;
  if (!confirm(`确定要删除文章「${name}」吗？此操作不可撤销。`)) return;
  deleting = true;
  showToast('删除中...', 'info');
  try {
    await apiRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `docs: 删除文章 ${name}`,
        sha: sha
      })
    });
    showToast('文章已删除', 'success');
    loadPosts();
  } catch (e) {
    showToast(`删除失败: ${e.message}`, 'error');
  } finally {
    deleting = false;
  }
}

// ============================================================
// Markdown 预览
// ============================================================
function updatePreview() {
  const md = document.getElementById('editor-textarea').value;
  const raw = marked.parse(md);
  const html = window.DOMPurify ? DOMPurify.sanitize(raw) : raw;
  document.getElementById('preview-pane').innerHTML = html;
  scheduleAutoSave();
}

// ============================================================
// 工具栏插入
// ============================================================
function insertMd(type) {
  const ta = document.getElementById('editor-textarea');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const selected = ta.value.substring(start, end);
  let insert = '';
  // 是否选中占位文本（无选区时选中占位词方便替换）
  let selStart = null, selEnd = null;

  function withPlaceholder(prefix, placeholder, suffix) {
    if (selected) return prefix + selected + suffix;
    insert = prefix + placeholder + suffix;
    selStart = start + prefix.length;
    selEnd = selStart + placeholder.length;
    return insert;
  }

  switch (type) {
    case 'bold': insert = withPlaceholder('**', '粗体文本', '**'); break;
    case 'italic': insert = withPlaceholder('*', '斜体文本', '*'); break;
    case 'code': insert = selected.includes('\n')
      ? `\n\`\`\`\n${selected || '代码'}\n\`\`\`\n`
      : withPlaceholder('`', '代码', '`'); break;
    case 'link': insert = withPlaceholder('[', '链接文本', '](url)'); break;
    case 'h2': insert = `\n## ${selected || '标题'}\n`; break;
    case 'h3': insert = `\n### ${selected || '标题'}\n`; break;
    case 'ul': insert = `\n- ${selected || '列表项'}\n`; break;
    case 'ol': insert = `\n1. ${selected || '列表项'}\n`; break;
    case 'quote': insert = `\n> ${selected || '引用内容'}\n`; break;
    case 'hr': insert = `\n\n---\n\n`; break;
    case 'table': insert = `\n| 列1 | 列2 |\n| --- | --- |\n| 内容 | 内容 |\n`; break;
  }

  ta.value = ta.value.substring(0, start) + insert + ta.value.substring(end);
  ta.focus();
  if (selStart !== null) {
    ta.selectionStart = selStart; ta.selectionEnd = selEnd;
  } else {
    ta.selectionStart = ta.selectionEnd = start + insert.length;
  }
  updatePreview();
}

// ============================================================
// 图片上传
// ============================================================
function triggerImageUpload() {
  document.getElementById('image-upload').click();
}

async function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  await uploadImage(file);
  event.target.value = '';
}

async function uploadImage(file) {
  if (!file.type.startsWith('image/')) {
    showToast('请选择图片文件', 'error');
    return;
  }
  if (file.size > 5 * 1024 * 1024) {
    showToast('图片过大（>5MB），请压缩后上传', 'error');
    return;
  }
  const btn = document.getElementById('btn-upload');
  if (btn.disabled) return;
  setBtnLoading(btn, true, '上传中');
  try {
    const base64 = await fileToBase64(file);
    const timestamp = Date.now();
    const ext = (file.name.split('.').pop() || 'png').toLowerCase();
    // 文件名 slug 化：去掉扩展名后只保留安全字符
    const baseName = file.name.replace(/\.[^.]+$/, '');
    const slug = baseName.replace(/[^a-zA-Z0-9_-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '') || 'image';
    const path = `assets/images/posts/${timestamp}-${slug}.${ext}`;

    await apiRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `docs: 上传图片 ${slug}.${ext}`,
        content: base64
      })
    });

    // 插入 Markdown 图片语法
    const imgUrl = `/${path}`;
    const ta = document.getElementById('editor-textarea');
    const pos = ta.selectionStart;
    const imgMd = `![${slug}](${imgUrl})`;
    ta.value = ta.value.substring(0, pos) + imgMd + ta.value.substring(pos);
    ta.selectionStart = ta.selectionEnd = pos + imgMd.length;
    updatePreview();
    showToast('图片上传成功', 'success');
  } catch (e) {
    showToast(`上传失败: ${e.message}`, 'error');
  } finally {
    setBtnLoading(btn, false, '📤 图片');
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      // 去掉 data:image/xxx;base64, 前缀
      const base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
</script>

<script>
// ============================================================
// Base64 编解码（支持 UTF-8 中文）
// ============================================================
function encodeBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}

function decodeBase64(base64) {
  // GitHub API 返回的 base64 含换行符，需先清除
  const clean = base64.replace(/\s/g, '');
  const binary = atob(clean);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return new TextDecoder().decode(bytes);
}

// ============================================================
// 拖拽上传
// ============================================================
function initDragDrop() {
  const dropZone = document.getElementById('drop-zone');
  const editorPane = document.querySelector('.editor-pane');
  if (!editorPane) return;

  ['dragenter', 'dragover'].forEach(evt => {
    editorPane.addEventListener(evt, e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
  });
  ['dragleave', 'drop'].forEach(evt => {
    editorPane.addEventListener(evt, e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
    });
  });
  editorPane.addEventListener('drop', e => {
    const files = e.dataTransfer.files;
    if (files.length > 0) uploadImage(files[0]);
  });
}

// ============================================================
// 全局事件：快捷键 + 未保存保护
// ============================================================
function initGlobalEvents() {
  // meta 输入框变更标记 dirty
  ['meta-title', 'meta-category', 'meta-tags', 'meta-series'].forEach(id => {
    document.getElementById(id).addEventListener('input', scheduleAutoSave);
  });
  document.getElementById('meta-draft').addEventListener('change', () => { isDirty = true; });

  // 关闭/刷新页面前提醒
  window.addEventListener('beforeunload', e => {
    if (isDirty) { e.preventDefault(); e.returnValue = ''; }
  });

  // 键盘快捷键
  document.addEventListener('keydown', e => {
    const editorVisible = document.getElementById('panel-editor').style.display !== 'none';
    if (!editorVisible) return;
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault(); savePost();
    } else if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
      e.preventDefault(); insertMd('bold');
    } else if ((e.ctrlKey || e.metaKey) && e.key === 'i') {
      e.preventDefault(); insertMd('italic');
    }
  });
}

// ============================================================
// 应用初始化
// ============================================================
async function init() {
  // 检查 URL 中是否有 OAuth code
  const params = new URLSearchParams(location.search);
  const code = params.get('code');

  if (code) {
    const success = await exchangeCode(code);
    if (!success) {
      showView('login');
      return;
    }
  }

  const token = getToken();
  if (!token) {
    showView('login');
    return;
  }

  // 验证用户
  const valid = await verifyUser();
  if (!valid) {
    showView('login');
    return;
  }

  showView('app');
  initGlobalEvents();
  loadPosts();
  initDragDrop();
  restoreLocalDraft();
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', init);
</script>
