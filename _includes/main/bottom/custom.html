<!-- start custom main bottom snippet -->
<script>
(function () {
  // 展开/收起更多标签
  var toggleBtn = document.querySelector('.js-tags-toggle');
  if (toggleBtn) {
    var restList = document.querySelector('.js-tags-rest');
    var arrow = document.querySelector('.js-tags-arrow');
    toggleBtn.addEventListener('click', function () {
      var isOpen = restList.style.display !== 'none';
      restList.style.display = isOpen ? 'none' : 'flex';
      if (arrow) arrow.classList.toggle('is-open', !isOpen);
    });
  }
})();
</script>
<!-- end custom main bottom snippet -->
