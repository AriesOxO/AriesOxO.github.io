<!DOCTYPE html>
{%- include snippets/get-lang.html -%}
<html lang="{{ __return }}">
  <head>
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    {%- include analytics.html -%}
    {%- include head.html -%}
    <script>
      {%- include scripts/utils/utils.js -%}
      {%- include scripts/lib/throttle.js -%}
      {%- include scripts/lib/lazyload.js -%}
    </script>
    {%- include scripts/variables.html -%}
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "jt895a00y4");
    </script>
  </head>
  <body>
    <div class="root" data-is-touch="false">
      {{ content }}
    </div>
    <script>
      {%- include scripts/common.js -%}
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script type="text/javascript">
      var a_idx = 0;
      jQuery(document).ready(function($) {
        $("body").click(function(e) {
          var a = new Array("富强", "民主", "文明", "和谐", "自由", "平等", "公正" ,"法治", "爱国", "敬业", "诚信", "友善", "手麻了", "歇会儿");
          var $i = $("<span/>").text(a[a_idx]);
          a_idx = (a_idx + 1) % a.length;
          var x = e.pageX,
            y = e.pageY;
          $i.css({
            "z-index": 9999,
            "top": y - 20,
            "left": x,
            "position": "absolute",
            "font-weight": "bold",
            "color": "#ff6651"
          });
          $("body").append($i);
          $i.animate({
              "top": y - 180,
              "opacity": 0
            },
            1500,
            function() {
              $i.remove();
            });
        });
      });
    </script>
    <button class="theme-toggle d-print-none" id="themeToggle" aria-label="切换暗色模式">🌙</button>
    <button class="back-to-top d-print-none" id="backToTop" aria-label="返回顶部"><i class="fas fa-chevron-up"></i></button>
    <script>
      (function() {
        var btn = document.getElementById('themeToggle');
        var html = document.documentElement;
        function isDark() { return html.getAttribute('data-theme') === 'dark'; }
        function update() { btn.textContent = isDark() ? '☀️' : '🌙'; }
        update();
        btn.addEventListener('click', function() {
          if (isDark()) {
            html.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
          } else {
            html.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
          }
          update();
        });
        var topBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', function() {
          topBtn.classList.toggle('visible', window.scrollY > 300);
        });
        topBtn.addEventListener('click', function() {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      })();
    </script>
  </body>
</html>
